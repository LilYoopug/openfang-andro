name: Build OpenFang Full (ARM Ubuntu)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to build and upload assets for"
        required: false
  push:
    tags:
      - "v*-andro"

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Resolve checkout and release refs
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            echo "checkout_ref=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "checkout_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.refs.outputs.checkout_ref }}

      - name: System deps (build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang cmake perl git curl \
            libssl-dev libsqlite3-dev

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: arm-ubuntu24

      - name: Build CLI binary
        env:
          CARGO_BUILD_JOBS: "2"
          RUSTFLAGS: "-C debuginfo=0"
        run: |
          cargo build --release --locked -p openfang-cli --bin openfang

      - name: Collect release binary
        run: |
          mkdir -p out/bin
          cp target/release/openfang out/bin/openfang
          ls -lah out/bin

      - name: Package
        run: |
          tar -C out -czf openfang-aarch64-unknown-linux-gnu-native.tar.gz bin
          sha256sum openfang-aarch64-unknown-linux-gnu-native.tar.gz > openfang-aarch64-unknown-linux-gnu-native.tar.gz.sha256

      - name: Upload artifact (manual run without release tag)
        if: github.event_name == 'workflow_dispatch' && steps.refs.outputs.release_tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: openfang-aarch64-unknown-linux-gnu-native
          path: openfang-aarch64-unknown-linux-gnu-native.tar.gz

      - name: Upload to GitHub Release
        if: steps.refs.outputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.refs.outputs.release_tag }}
          files: |
            openfang-aarch64-unknown-linux-gnu-native.tar.gz
            openfang-aarch64-unknown-linux-gnu-native.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
